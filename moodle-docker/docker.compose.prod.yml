services:
  webserver:
    image: moodlehq/moodle-php-apache:8.3
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../moodle:/var/www/html
      - moodledata:/var/www/moodledata
    ports:
      - "80:80"
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: moodle
      POSTGRES_PASSWORD: "m@0dl3ing"
      POSTGRES_DB: moodle
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moodle"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  moodledata:
  pgdata:
